name: "weather"
version: "1.0.0"
description: Weather data collection and correlation analysis
author: "Minder"
license: "MIT"

minder:
  min_version: "1.0.0"

python:
  min_version: "3.11"

dependencies:
  python:
    - "requests>=2.31.0"
    - "python-dateutil>=2.8.0"

permissions:
  filesystem:
    read: []
    write: []
    execute: []
  network:
    allowed_hosts: ["api.openweathermap.org"]
    allowed_ports: [443]
    max_requests_per_minute: 60
  database:
    databases: []
    tables: []
    operations: []
  resources:
    max_memory_mb: 256
    max_cpu_percent: 30
    max_execution_time: 120

capabilities:
  - "weather_data_collection"
  - "forecast_analysis"
  - "seasonal_pattern_detection"

ai_tools:
  - name: get_weather_data
    description: Get latest weather data for configured locations including temperature, humidity, conditions
    type: analysis
    endpoint: /analysis
    method: GET
    parameters:
      location:
        type: string
        description: Location name - default is Istanbul
        default: "Istanbul"
        required: false
    response_format:
      temperature: float
      humidity: float
      conditions: string
      timestamp: string
