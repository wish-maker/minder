name: "tefas"
version: "1.0.0"
description: Türkiye yatırım fonları analizi ve takibi
author: "Minder"
license: "MIT"

minder:
  min_version: "1.0.0"

python:
  min_version: "3.11"

dependencies:
  python:
    - "tefas-crawler>=0.5.0"
    - "aiohttp>=3.9.0"
    - "beautifulsoup4>=4.12.0"
    - "pandas>=2.1.0"
    - "psycopg2-binary>=2.9.9"

permissions:
  filesystem:
    read: []
    write: []
    execute: []
  network:
    allowed_hosts: ["tefas.gov.tr", "www.tefas.gov.tr"]
    allowed_ports: [443]
    max_requests_per_minute: 60
  database:
    databases: []
    tables: []
    operations: []
  resources:
    max_memory_mb: 256
    max_cpu_percent: 30
    max_execution_time: 120

capabilities:
  - "fund_discovery"
  - "historical_data_analysis"
  - "fund_performance_tracking"
  - "trend_detection"

# AI Tools for OpenWebUI Integration
ai_tools:
  - name: get_tefas_funds
    description: Get Turkish investment fund data from TEFAS including price, change, performance
    type: analysis
    endpoint: /analysis
    method: GET
    parameters:
      fund_type:
        type: string
        description: Fund type filter (YATIRIM, BORSA)
        enum: ["YATIRIM", "BORSA"]
        default: YATIRIM
        required: false
      limit:
        type: integer
        description: Number of funds to return
        default: 10
        required: false
    response_format:
      funds: array
      total: integer
