name: "news"
version: "1.0.0"
description: News aggregation and sentiment analysis
author: "Minder"
license: "MIT"

minder:
  min_version: "1.0.0"

python:
  min_version: "3.11"

dependencies:
  python:
    - "requests>=2.31.0"
    - "beautifulsoup4>=4.12.0"

permissions:
  filesystem:
    read: []
    write: []
    execute: []
  network:
    allowed_hosts: ["newsapi.org", "rss.cnn.com"]
    allowed_ports: [443]
    max_requests_per_minute: 60
  database:
    databases: []
    tables: []
    operations: []
  resources:
    max_memory_mb: 256
    max_cpu_percent: 30
    max_execution_time: 120

capabilities:
  - "news_aggregation"
  - "sentiment_analysis"
  - "trend_detection"

# AI Tools for OpenWebUI Integration
ai_tools:
  - name: get_latest_news
    description: Get latest news articles with sentiment analysis from RSS feeds
    type: analysis
    endpoint: /analysis
    method: GET
    parameters:
      limit:
        type: integer
        description: Number of articles to return (1-50)
        default: 10
        required: false
    response_format:
      articles: array
      total: integer
