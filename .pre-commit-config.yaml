# .pre-commit-config.yaml
# Minder Platform - Pre-commit Hooks Configuration
# See: https://pre-commit.com/ for more information

repos:
  # ============================================================================
  # Code Formatting
  # ============================================================================

  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black
        name: black (code formatter)
        args: [--line-length=120]
        language_version: python3.11
        description: Auto-format Python code to consistent style

  # ============================================================================
  # Import Sorting
  # ============================================================================

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: isort (import sorter)
        args: ['--profile', 'black', '--line-length=120']
        description: Sort imports according to PEP 8

  # ============================================================================
  # Linting
  # ============================================================================

  - repo: https://github.com/PyCQA/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        name: flake8 (linter)
        args: ['--max-line-length=120', '--extend-ignore=E203,W503,E501']
        description: Check Python code for style and syntax errors

  # ============================================================================
  # Security Linting
  # ============================================================================

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        name: bandit (security linter)
        args: ['-c', 'pyproject.toml']
        additional_dependencies: ['bandit[toml]']
        description: Check for common security issues in Python code

  # ============================================================================
  # Type Checking (Manual)
  # ============================================================================

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.9.0
    hooks:
      - id: mypy
        name: mypy (type checker)
        additional_dependencies: [
          types-requests,
          types-pyyaml,
          types-aiofiles,
          types-redis
        ]
        args: [--ignore-missing-imports, --no-strict-optional]
        exclude: ^tests/
        stages: [manual]  # Only run manually, not on commits
        description: Check Python type hints (run manually)

  # ============================================================================
  # Hooks Configuration
  # ============================================================================

# Global configuration
default_stages: [commit]  # Run hooks on commit
fail_fast: false  # Run all hooks, don't stop at first failure

# CI configuration
ci:
  autofix_commit_msg: |
    style: auto-fix by pre-commit hooks
    for: black, isort
  autoupdate_commit_msg: 'chore: update pre-commit hooks'
  autoupdate_schedule: weekly

# Skip hooks for certain files
exclude: |
  (?x)^(
    \.git/|
    \.hg/|
    \.mypy_cache/|
    \.tox/|
    \.venv/|
    \.eggs/|
    \.eggs-info/|
    build/|
    dist/|
    _build/|
    docs/_build/
  )

