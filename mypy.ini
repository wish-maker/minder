[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
ignore_missing_imports = True

# Ignore external library type issues
[[mypy.overrides]]
module = [
  "redis.*",
  "src.shared.database.redis",
  "src.shared.rate_limiter",
  "src.shared.config.base",
  "asyncpg.*",
  "jwt.*",
  "ollama.*",
  "psutil",
  "yaml",
]
ignore_errors = True
