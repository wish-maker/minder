[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
ignore_missing_imports = True

# Ignore specific Redis type issues
[[mypy.overrides]]
module = "redis.*"
ignore_errors = True

# Ignore specific Redis async type issues
[[mypy.overrides]]
module = "src.shared.database.redis"
ignore_errors = True

[[mypy.overrides]]
module = "src.shared.rate_limiter"
ignore_errors = True
