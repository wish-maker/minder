# Test environment for E2E auth tests
# Run: docker compose -f docker-compose.test.yml up -d
# Stop: docker compose -f docker-compose.test.yml down

services:
  test-postgres:
    image: postgres:16-alpine
    container_name: minder-test-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: minder_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10
    networks:
      - test-network

networks:
  test-network:
    driver: bridge
