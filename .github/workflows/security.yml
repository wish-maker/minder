name: Security Scan

# Deep security scans: CodeQL (SAST) + Trivy (container CVE). Kept push/PR-triggered
# (NOT scheduled-only) — #16 chose Option 2: on this repo CodeQL is ~1min and Trivy
# ~45s (not the "heavy" scans the issue assumed), the repo is public (free CI minutes),
# and these run in parallel with ci.yml off the critical path, so gating every push
# costs ~0 wall-clock while closing the exposure window on an internet-exposed target.
# The weekly schedule stays as defense-in-depth (CVE feeds update over time).
# Light scans (bandit, safety, secrets, hadolint, license) live in quality.yml.

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Her hafta çarşamba 09:00 UTC'de çalıştır
    - cron: '0 9 * * 3'
  workflow_dispatch:  # Manuel tetikleme

env:
  PYTHON_VERSION: '3.12'

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"

  trivy:
    name: Trivy Container Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Build Docker image
        run: |
          docker compose -f docker/compose/docker-compose.yml build api-gateway

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'minder/api-gateway:1.0.0'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy'

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [codeql, trivy]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "# 🔒 Deep Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📊 Results" >> $GITHUB_STEP_SUMMARY
          echo "- CodeQL (SAST): ${{ needs.codeql.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Trivy (container CVE): ${{ needs.trivy.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Light scans (bandit, safety, secrets, hadolint, license) run in quality.yml." >> $GITHUB_STEP_SUMMARY
