name: Python Dependency Auto-Update

# Companion to docker-image-update.yml (which covers 3rd-party Docker images) for the
# Python side: reports outdated pins across the services' requirements.txt — including
# the plugin libraries (tefas-crawler, borsapy, …). Kept as a SEPARATE workflow so it
# can't destabilise the docker-image check. See scripts/check_pip_updates.py.

on:
  # Tuesdays 09:00 UTC (offset a day from the docker check) + manual dispatch.
  schedule:
    - cron: '0 9 * * 2'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-pip-updates:
    name: Check for Python dependency updates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Check pinned dependencies against PyPI
        run: python scripts/check_pip_updates.py --out pip-report.md

      - name: Upload report
        uses: actions/upload-artifact@v6
        with:
          name: pip-updates-report
          path: pip-report.md

      - name: Create or update the report issue
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('pip-report.md', 'utf8');
            const today = new Date().toISOString().split('T')[0];
            const title = 'Python Dependency Updates - ' + today;
            const body = report +
              `\n\n---\n*Generated by [Python Dependency Auto-Update]` +
              `(${context.serverUrl}/${context.repo.owner}/${context.repo.repo}` +
              `/actions/runs/${context.runId}). Pins live in the services' ` +
              `requirements.txt; edit those directly, then bump the image.*\n`;

            // Reuse an existing open report issue (avoid daily spam), else create one.
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'dependencies,python',
            });
            if (existing.data.length > 0) {
              const num = existing.data[0].number;
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: num, title, body,
              });
              core.info(`Updated existing issue #${num}`);
            } else {
              const res = await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ['dependencies', 'python'],
              });
              core.info(`Created issue #${res.data.number}`);
            }
