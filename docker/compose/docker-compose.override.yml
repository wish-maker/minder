# ============================================================================
# Docker Compose Override - Development Only
# ============================================================================
# This file provides development convenience overrides.
# It opens direct port access to services for local testing.
#
# Usage (development with direct port access):
#   docker compose -f docker-compose.yml -f docker-compose.override.yml up
#
# Usage (production - no direct port access):
#   docker compose up
# ============================================================================

services:
  # Open plugin-registry port 8001 for direct testing
  plugin-registry:
    ports:
      - "8001:8001"  # Dev only - for direct API testing without gateway

  # Optionally open other services for debugging
