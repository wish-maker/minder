# ============================================================================
# Docker Secrets Override
# ============================================================================
# This file extends docker-compose.yml to add Docker Secrets support.
# Use with: docker compose -f docker-compose.yml -f docker-compose.secrets.yml up
#
# This approach separates secrets configuration from the main compose file,
# making it easier to manage and debug.
# ============================================================================

secrets:
  postgres_password:
    file: ../../.secrets/postgres_password.secret
  redis_password:
    file: ../../.secrets/redis_password.secret
  rabbitmq_password:
    file: ../../.secrets/rabbitmq_password.secret
  jwt_secret:
    file: ../../.secrets/jwt_secret.secret
  webui_secret_key:
    file: ../../.secrets/webui_secret_key.secret
  grafana_password:
    file: ../../.secrets/grafana_password.secret
  influxdb_admin_password:
    file: ../../.secrets/influxdb_admin_password.secret
  influxdb_token:
    file: ../../.secrets/influxdb_token.secret
  authelia_jwt_secret:
    file: ../../.secrets/authelia_jwt_secret.secret
  authelia_session_secret:
    file: ../../.secrets/authelia_session_secret.secret
  authelia_storage_encryption_key:
    file: ../../.secrets/authelia_storage_encryption_key.secret

services:
  postgres:
    secrets:
      - postgres_password
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_PASSWORD: null  # Unset to avoid conflict with _FILE variant

  redis:
    secrets:
      - redis_password
    command: sh -c 'redis-server --appendonly yes --requirepass "$$(cat /run/secrets/redis_password)" --masterauth "$$(cat /run/secrets/redis_password)"'
    environment:
      REDIS_PASSWORD: null  # Unset to avoid conflicts
    healthcheck:
      test:
      - CMD
      - sh
      - -c
      - 'redis-cli -a "$$(cat /run/secrets/redis_password)" ping'

  rabbitmq:
    secrets:
      - rabbitmq_password
    environment:
      RABBITMQ_DEFAULT_PASS_FILE: /run/secrets/rabbitmq_password
      RABBITMQ_DEFAULT_PASS: null  # Unset to avoid conflict with _FILE variant

  grafana:
    secrets:
      - grafana_password
    environment:
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_password
      GF_SECURITY_ADMIN_PASSWORD: null  # Unset to avoid conflict with __FILE variant

  influxdb:
    secrets:
      - influxdb_admin_password
      - influxdb_token
    environment:
      DOCKER_INFLUXDB_INIT_PASSWORD_FILE: /run/secrets/influxdb_admin_password
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN_FILE: /run/secrets/influxdb_token
      DOCKER_INFLUXDB_INIT_PASSWORD: null  # Unset to avoid conflict with _FILE variant
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: null  # Unset to avoid conflict with _FILE variant

  authelia:
    secrets:
      - authelia_storage_encryption_key
      - authelia_jwt_secret
      - postgres_password
    environment:
      AUTHELIA_STORAGE_POSTGRES_PASSWORD: null  # Set by entrypoint script
      AUTHELIA_STORAGE_ENCRYPTION_KEY: null  # Set by entrypoint script
      AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET: null  # Set by entrypoint script
    volumes:
    - ./authelia/entrypoint.sh:/entrypoint.sh:ro
    entrypoint:
    - /entrypoint.sh
