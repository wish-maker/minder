# ============================================================================
# Telegraf Configuration for Minder Platform
# ============================================================================
# Pillar 4: Deep Observability - Host and container metrics collection
#
# This configuration collects comprehensive system metrics including CPU,
# memory, disk, network, and Docker container stats for InfluxDB storage.
# ============================================================================

[agent]
  ## Interval at which to gather metrics
  interval = "120s"
  ## Round interval to nearest interval
  round_interval = true
  ## Flush interval
  flush_interval = "120s"
  ## Log file can be stdout for container logging
  # logfile = "/dev/stdout"  # Disabled for container compatibility
  ## Debug mode
  debug = false
  ## Metric batch size (reduces CPU overhead)
  metric_batch_size = 1000
  ## Metric buffer limit
  metric_buffer_limit = 10000

###############################################################################
#                            OUTPUT PLUGINS                                   #
###############################################################################

# Prometheus Metrics Endpoint (for Telegraf's own metrics)
[[outputs.prometheus_client]]
  ## Address to listen on
  listen = ":9273"
  ## Metric version controls
  ##   1 = Prometheus exposition format (text-based format)
  ##   2 = OpenMetrics format
  metric_version = 1
  ## Use batch format for Prometheus metrics
  ## Batch format creates more efficient metric transmission
  string_as_label = false

# InfluxDB 2.x Output
[[outputs.influxdb_v2]]
  ## InfluxDB 2.x URLs
  urls = ["http://influxdb:8086"]

  ## Token for authentication
  ## Use environment variable INFLUXDB_TOKEN
  token = "${INFLUXDB_TOKEN}"

  ## Organization
  organization = "minder"

  ## Destination bucket
  bucket = "minder-metrics"

  ## Precision for timestamps
  precision = "s"

###############################################################################
#                            INPUT PLUGINS                                    #
###############################################################################

# CPU Metrics
[[inputs.cpu]]
  ## Collect CPU metrics
  ## Per-CPU and total CPU usage
  percpu = true
  totalcpu = true
  ## Collect CPU time for each state
  collect_cpu_time = false

# Memory Metrics
[[inputs.mem]]

# Disk Metrics
[[inputs.disk]]
  ## Collect disk metrics for all mounted filesystems
  mount_points = ["/"]

# Disk I/O Metrics
[[inputs.diskio]]

# Network Metrics
[[inputs.net]]
  ## Collect interface metrics
  ## Exclude specific interfaces if needed
  # interface_exclude = ["docker*", "veth*", "br-*"]

# System Load Average
[[inputs.system]]

# Process Stats
[[inputs.processes]]

###############################################################################
#                            SERVICE INPUTS                                  #
###############################################################################

# PostgreSQL Metrics
[[inputs.postgresql]]
  ## PostgreSQL connection parameters
  address = "postgres://minder:${POSTGRES_PASSWORD}@postgres:5432/minder?sslmode=disable"
  ## Databases to collect metrics from
  databases = ["minder", "minder_marketplace"]

# Redis Metrics
[[inputs.redis]]
  ## Redis connection parameters
  servers = ["tcp://redis:6379"]
  ## Redis password (if required)
  password = "${REDIS_PASSWORD}"

###############################################################################
#                            DOCKER INPUTS                                   #
###############################################################################

# Docker Container Metrics
[[inputs.docker]]
  ## Docker endpoint
  endpoint = "unix:///var/run/docker.sock"

  ## Timeout for docker list
  timeout = "5s"

  ## Collect sources (cpu, mem, net, blkio)
  source_tag = true

###############################################################################
#                            SERVICE INPUTS                                  #
###############################################################################

# Telegraf Internal Metrics
[[inputs.internal]]
  ## Collect internal Telegraf metrics
  collect_memstats = true

# PostgreSQL Metrics
[[processors.override]]
  [processors.override.tags]
    hostname = "${HOSTNAME:minder-server}"
    environment = "${ENVIRONMENT:production}"
    cluster = "minder-platform"

###############################################################################
#                            AGGREGATORS                                     #
###############################################################################
# Aggregators disabled - metrics sent directly to InfluxDB
