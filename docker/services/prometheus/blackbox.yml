# Blackbox Exporter Configuration for Minder Platform
# Pillar 4: Remote endpoint health monitoring

modules:
  http_2xx:
    prober: http
    timeout: 10s
    http:
      valid_http_versions:
        - "HTTP/1.1"
        - "HTTP/2.0"
      valid_status_codes:
        - 200
        - 204
      method: GET
      follow_redirects: true
      preferred_ip_protocol: "ip4"
      ip_protocol_fallback: false

  http_post_2xx:
    prober: http
    timeout: 10s
    http:
      valid_http_versions:
        - "HTTP/1.1"
        - "HTTP/2.0"
      valid_status_codes:
        - 200
        - 204
      method: POST
      follow_redirects: true
      preferred_ip_protocol: "ip4"

  tcp_connect:
    prober: tcp
    timeout: 10s
    tcp:
      preferred_ip_protocol: "ip4"

  icmp:
    prober: icmp
    timeout: 10s
    icmp:
      preferred_ip_protocol: "ip4"

  dns_tcp:
    prober: dns
    timeout: 10s
    dns:
      query_name: "minder.local"
      query_type: "A"
      transport_protocol: "tcp"
      preferred_ip_protocol: "ip4"

  dns_udp:
    prober: dns
    timeout: 10s
    dns:
      query_name: "minder.local"
      query_type: "A"
      transport_protocol: "udp"
      preferred_ip_protocol: "ip4"
