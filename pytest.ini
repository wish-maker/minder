[pytest]
# Pytest configuration for Minder project

# Markers for test categorization
markers =
    integration: marks tests as integration tests (live API calls)
    slow: marks tests as slow (skip during rapid development)
    unit: marks tests as unit tests (fast, isolated tests)

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Coverage (when pytest-cov is installed)
# addopts = --cov=. --cov-report=html --cov-report=term

# Paths
testpaths = tests
