[pytest]
# Pytest configuration for Minder project

# Asyncio configuration
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Markers for test categorization
markers =
    integration: marks tests as integration tests (live API calls)
    slow: marks tests as slow (skip during rapid development)
    unit: marks tests as unit tests (fast, isolated tests)
    e2e: marks tests as end-to-end tests (full user flows)
    load: marks tests as load tests (performance testing)
    security: marks tests as security tests (vulnerability scanning)
    performance: marks tests as performance tests (resource usage)

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Paths
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --durations=10
    --maxfail=5
    --timeout=300

# Coverage (when pytest-cov is installed)
# addopts = --cov=src/ services/ --cov-report=html --cov-report=term-missing --cov-fail-under=70

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Test timeout
timeout = 300  # 5 minutes max per test

# Performance thresholds
performance_max_response_time = 1000  # 1 second max
performance_min_success_rate = 95  # 95% min

# Security thresholds
security_max_severity = medium  # Fail on high/critical

# Load test settings
load_max_users = 100
load_max_duration = 300  # 5 minutes

# Ignore patterns
ignore =
    tests/manual/*
    tests/skipped/*
