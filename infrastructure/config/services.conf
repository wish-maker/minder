# Minder External Services Configuration
# Uncomment and configure to use external services instead of local containers

# ============================================================================
# Redis Configuration
# ============================================================================
# Options: Use local Docker Redis (default) or external Redis service
# --------------------------------------------------------------------------

# Use external Redis (uncomment to enable)
#REDIS_HOST=your-redis-cluster.example.com
#REDIS_PORT=6379
#REDIS_PASSWORD=your-redis-password
#REDIS_TLS=true
#REDIS_DB=0

# Examples:
# - Redis Labs: REDIS_HOST=redis-12345.c1.us-east-1-2.aws.cloud.redislabs.com
# - AWS ElastiCache: REDIS_HOST=my-cluster.xxxxx.use1.cache.amazonaws.com
# - LocalStack: REDIS_HOST=localhost REDIS_PORT=6379

# ============================================================================
# PostgreSQL Configuration
# ============================================================================
# Options: Use local Docker PostgreSQL (default) or external database
# --------------------------------------------------------------------------

# Use external PostgreSQL (uncomment to enable)
#POSTGRES_HOST=your-postgres-db.example.com
#POSTGRES_PORT=5432
#POSTGRES_USER=minder
#POSTGRES_PASSWORD=your-secure-password
#POSTGRES_DB=minder
#POSTGRES_SSLMODE=require
#POSTGRES_POOL_SIZE=20

# Connection String Format: postgresql://user:password@host:port/db
# Examples:
# - AWS RDS: POSTGRES_HOST=minder-db.xxxxx.us-east-1.rds.amazonaws.com
# - Heroku Postgres: Use DATABASE_URL environment variable
# - Neon: POSTGRES_HOST=ep-cool-darkness.us-east-2.aws.neon.tech
# - Railway: Use DATABASE_URL environment variable
# - Supabase: POSTGRES_HOST=db.xxxxx.supabase.co

# Alternatively, use full connection string:
#DATABASE_URL=postgresql://minder:password@host:5432/minder

# ============================================================================
# Qdrant Configuration (Vector Database)
# ============================================================================
# Options: Use local Docker Qdrant (default) or Qdrant Cloud
# --------------------------------------------------------------------------

# Use Qdrant Cloud (uncomment to enable)
#QDRANT_HOST=your-cluster.qdrant.io
#QDRANT_PORT=6333
#QDRANT_API_KEY=your-qdrant-cloud-api-key
#QDRANT_TLS=true

# Examples:
# - Qdrant Cloud: QDRANT_HOST=your-cluster.qdrant.io QDRANT_API_KEY=xyz
# - Local Qdrant: QDRANT_HOST=localhost QDRANT_PORT=6333

# ============================================================================
# Service Discovery Override (Optional)
# ============================================================================
# Force specific services to use custom endpoints
# --------------------------------------------------------------------------

# Override plugin registry URL
#PLUGIN_REGISTRY_URL=http://custom-plugin-registry:8001

# Override RAG pipeline URL
#RAG_PIPELINE_URL=http://custom-rag-pipeline:8004

# Override model management URL
#MODEL_MANAGEMENT_URL=http://custom-model-management:8005

# ============================================================================
# Plugin Configuration
# ============================================================================

# Plugin data directory
#PLUGINS_DATA_PATH=/app/plugins-data

# Plugin configuration files
#TEFAS_CONFIG_PATH=/app/config/tefas_config.yml
#WEATHER_CONFIG_PATH=/app/config/weather_config.yml
#CRYPTO_CONFIG_PATH=/app/config/crypto_config.yml

# ============================================================================
# Example Configurations
# ============================================================================

# Example 1: AWS Infrastructure
# --------------------------------------
#REDIS_HOST=minder-redis.xxxxx.use1.cache.amazonaws.com
#POSTGRES_HOST=minder-postgres.xxxxx.us-east-1.rds.amazonaws.com
#POSTGRES_PASSWORD=your-rds-password
#QDRANT_HOST=https://qdrant-cloud.your-account.cloud.qdrant.io

# Example 2: Development (Local Services)
# --------------------------------------
#REDIS_HOST=localhost
#REDIS_PORT=6379
#POSTGRES_HOST=localhost
#POSTGRES_PORT=5432
#QDRANT_HOST=localhost
#QDRANT_PORT=6333

# Example 3: Hybrid (Local + External)
# --------------------------------------
#REDIS_HOST=localhost  # Local Redis for caching
#POSTGRES_HOST=aws-rds.amazonaws.com  # Cloud PostgreSQL
#QDRANT_HOST=qdrant-cloud.io  # Cloud Qdrant
