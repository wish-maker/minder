# Minder Production Platform - Microservices Architecture
# Phase 1: Core Infrastructure + API Gateway + Plugin Registry

services:
  # ============================================================================
  # Security & Access Control
  # ============================================================================

  # Traefik - Reverse Proxy and Load Balancer
  traefik:
    image: traefik:v2.10
    container_name: minder-traefik
    restart: unless-stopped
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.default.acme.tlschallenge=true"
      - "--certificatesresolvers.default.acme.email=${ACME_EMAIL:-admin@minder.local}"
      - "--certificatesresolvers.default.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
      - "8081:8080"  # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - traefik_letsencrypt:/letsencrypt
      - traefik_logs:/var/log/traefik
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 80 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - minder-network

  # Authelia - Single Sign-On and 2FA
  authelia:
    image: authelia/authelia:latest
    container_name: minder-authelia
    restart: unless-stopped
    environment:
      - AUTHELIA_STORAGE_POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - AUTHELIA_DEFAULT_ENCRYPTION_KEY=please_change_this_to_a_32_character_or_more_string
      - AUTHELIA_DEFAULT_JWT_SECRET=please_change_this_to_a_32_character_or_more_string
    volumes:
      - ./authelia/configuration.yml:/config/configuration.yml:ro
      - ./authelia/users_database.yml:/config/users_database.yml:ro
    ports:
      - "9091:9091"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9091/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - minder-network

  # ============================================================================
  # Infrastructure Services
  # ============================================================================

  # PostgreSQL - Primary Database
  postgres:
    image: postgres:16
    container_name: minder-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: minder
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: minder
      POSTGRES_MULTIPLE_DATABASES: tefas_db,weather_db,news_db,crypto_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minder"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - minder-network

  # Redis - Caching, Rate Limiting, Sessions
  redis:
    image: redis:7-alpine
    container_name: minder-redis
    restart: unless-stopped
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - minder-network

  # Ollama - Local LLM and Embedding Service
  ollama:
    image: ollama/ollama:latest
    container_name: minder-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_MODELS=${OLLAMA_MODELS:-llama3.2,mistral,qwen2.5,nomic-embed-text,mxbai-embed-large}
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c '</dev/tcp/127.0.0.1/11434' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - minder-network

  # Qdrant - Vector Database for RAG
  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: minder-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c '</dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - minder-network

  # Neo4j - Graph Database for Plugin Dependencies
  neo4j:
    image: neo4j:5.15-community
    container_name: minder-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/neo4j_test_password_change_me}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*
    volumes:
      - neo4j_data:/data
      - ./neo4j/init-cypher.sh:/docker-entrypoint-initdb.d/init-cypher.sh:ro
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - minder-network

  # ============================================================================
  # Core Microservices (Phase 1)
  # ============================================================================

  # API Gateway - Port 8000
  # Entry point for all API requests
  api-gateway:
    build:
      context: ../../
      dockerfile: services/api-gateway/Dockerfile
    image: minder/api-gateway:latest
    container_name: minder-api-gateway
    restart: unless-stopped
    environment:
      # Service Discovery (use container names)
      - PLUGIN_REGISTRY_URL=http://minder-plugin-registry:8001
      - RAG_PIPELINE_URL=http://minder-rag-pipeline:8004
      - MODEL_MANAGEMENT_URL=http://minder-model-management:8005

      # Infrastructure
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}

      # Security
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRATION_MINUTES=${JWT_EXPIRATION_MINUTES:-60}

      # Rate Limiting
      - RATE_LIMIT_ENABLED=true
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-60}
      - RATE_LIMIT_BURST=${RATE_LIMIT_BURST:-100}

      # Application
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - minder-network

  # Plugin Registry - Port 8001
  # Plugin discovery, lifecycle management, health monitoring
  plugin-registry:
    build:
      context: ../../
      dockerfile: services/plugin-registry/Dockerfile
    image: minder/plugin-registry:latest
    container_name: minder-plugin-registry
    restart: unless-stopped
    environment:
      # Database
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=minder
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=minder

      # Service Discovery
      - SERVICE_REGISTRY_BACKEND=redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}

      # Plugin Storage
      - PLUGINS_PATH=/app/plugins
      - PLUGINS_DATA_PATH=/app/plugins-data

      # Health Monitoring
      - HEALTH_CHECK_INTERVAL_SECONDS=30
      - HEALTH_CHECK_TIMEOUT_SECONDS=10

      # Application
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENVIRONMENT=${ENVIRONMENT:-development}

      # Marketplace Integration
      - MARKETPLACE_URL=http://minder-marketplace:8002
    env_file:
      - .env
    volumes:
      - ../../src/plugins:/app/plugins:ro
      - plugins_data:/app/plugins-data
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - minder-network

  # Plugin State Manager - Port 8003
  # Central plugin state management, licensing, and AI tools execution
  plugin-state-manager:
    build:
      context: ../../
      dockerfile: services/plugin-state-manager/Dockerfile
    image: minder/plugin-state-manager:latest
    container_name: minder-plugin-state-manager
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Database overrides
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=minder
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=minder_marketplace

      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}

      # Services
      - MARKETPLACE_URL=http://minder-marketplace:8002
      - PLUGIN_REGISTRY_URL=http://minder-plugin-registry:8001

      # Security
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=HS256

      # Application
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DEFAULT_PLUGINS_CONFIG=/app/config/default_plugins.yml
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      plugin-registry:
        condition: service_healthy
    volumes:
      - ../../config/default_plugins.yml:/app/config/default_plugins.yml:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - minder-network

  # ============================================================================
  # RAG Services (Phase 2) - Defined but not built yet
  # ============================================================================

  # RAG Pipeline - Port 8004
  # Knowledge base creation, document chunking, embedding generation with Ollama
  rag-pipeline:
    build:
      context: ../../
      dockerfile: services/rag-pipeline/Dockerfile
    image: minder/rag-pipeline:latest
    container_name: minder-rag-pipeline
    restart: unless-stopped
    environment:
      # Vector Database
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333

      # Ollama Configuration
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_EMBEDDING_MODEL=${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
      - OLLAMA_LLM_MODEL=${OLLAMA_LLM_MODEL:-llama3.2}

      # Model Management
      - MODEL_MANAGEMENT_URL=http://minder-model-management:8005

      # Application
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    ports:
      - "8004:8004"
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - minder-network

  # Model Management - Port 8005
  # Model registry, fine-tuning, versioning
  model-management:
    build:
      context: ../../
      dockerfile: services/model-management/Dockerfile
    image: minder/model-management:latest
    container_name: minder-model-management
    restart: unless-stopped
    environment:
      # Database
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=minder
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=minder

      # Storage
      - MODELS_PATH=/app/models
      - MODEL_CACHE_PATH=/app/model-cache

      # Application
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    volumes:
      - models_data:/app/models
      - models_cache:/app/model-cache
    ports:
      - "8005:8005"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - minder-network

  # ============================================================================
  # Time-Series Monitoring (InfluxDB + Telegraf + Grafana)
  # ============================================================================

  # InfluxDB 2.x - Time-series database for metrics
  influxdb:
    image: influxdb:2.7.4
    container_name: minder-influxdb
    restart: unless-stopped
    environment:
      # Authentication
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_ADMIN_USERNAME:-admin}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_ADMIN_PASSWORD:-minderadmin123}
      - DOCKER_INFLUXDB_INIT_ORG=minder
      - DOCKER_INFLUXDB_INIT_BUCKET=minder-metrics
      - DOCKER_INFLUXDB_INIT_RETENTION=30d
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN}
      # Logging
      - INFLUXDB_LOG_LEVEL=info
      - INFLUXDB_LOG_FORMAT=auto
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb
    ports:
      - "8086:8086"  # HTTP API
      - "8083:8083"  # UI (if using InfluxDB 1.x compatibility)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - minder-network

  # Telegraf - Metrics collection agent
  telegraf:
    image: telegraf:1.38.3
    container_name: minder-telegraf
    restart: unless-stopped
    volumes:
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      # InfluxDB connection
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN:-my-super-secret-auth-token}
      - HOSTNAME=minder-server
      - INSTANCE=production
      # Service credentials
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      influxdb:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["--config", "/etc/telegraf/telegraf.conf", "--non-strict-env-handling"]
    healthcheck:
      test: ["CMD", "pgrep", "-f", "telegraf"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - minder-network
    # Telegraf needs host process access for some metrics
    privileged: false
    pid: host  # Access to host PID namespace for process metrics
    user: root  # Run as root for /dev/stdout access

  # ============================================================================
  # Legacy Monitoring (Optional - Prometheus Stack)
  # ============================================================================

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: minder-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - minder-network
    profiles:
      - monitoring
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'

  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: minder-alertmanager
    restart: unless-stopped
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "9093:9093"
    networks:
      - minder-network
    profiles:
      - monitoring
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'

  grafana:
    image: grafana/grafana:10.2.2
    container_name: minder-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3000:3000"
    networks:
      - minder-network
    profiles:
      - monitoring

  # ============================================================================
  # Web UI - OpenWebUI
  # ============================================================================

  # OpenWebUI - Browser-based Chat Interface
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: minder-openwebui
    restart: unless-stopped
    environment:
      # Ollama Backend Connection
      - OLLAMA_BASE_URL=http://ollama:11434

      # RAG Pipeline Connection
      - RAG_PIPELINE_URL=http://minder-rag-pipeline:8004
      - RAG_ENABLED=true

      # Minder AI Integration - Tool Calling
      - MINDER_API_GATEWAY_URL=http://minder-api-gateway:8000
      - MINDER_AI_TOOLS_ENABLED=true
      - MINDER_FUNCTIONS_CONFIG=/app/config/functions.json

      # Data Storage (PostgreSQL)
      - DATABASE_URL=postgresql://minder:${POSTGRES_PASSWORD}@postgres:5432/minder

      # Authentication
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-change-this-to-a-random-secret-key}
      - WEBUI_AUTH=${WEBUI_AUTH:-true}

      # JWT Integration with Minder
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION_MINUTES=${JWT_EXPIRATION_MINUTES:-60}

      # Application
      - ENABLE_SIGNUP=true
      - DEFAULT_USER_ROLE=user
      - DEFAULT_MODELS=${OLLAMA_LLM_MODEL:-llama3.2}

      # Custom branding
      - WEBUI_NAME=Minder AI Chat
      - WEBUI_URL=http://localhost:3000

      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - openwebui_data:/app/backend/data
      - ./openwebui/functions.json:/app/config/functions.json:ro
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
      rag-pipeline:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - minder-network

  # Marketplace - Plugin Marketplace and Licensing
  marketplace:
    build:
      context: ../../
      dockerfile: services/marketplace/Dockerfile
    image: minder/marketplace:latest
    container_name: minder-marketplace
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Database (override from .env)
      - MARKETPLACE_DATABASE_HOST=postgres
      - MARKETPLACE_DATABASE_PORT=5432
      - MARKETPLACE_DATABASE_USER=minder
      - MARKETPLACE_DATABASE_PASSWORD=${POSTGRES_PASSWORD}
      - MARKETPLACE_DATABASE_NAME=minder_marketplace

      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}

      # Services
      - PLUGIN_REGISTRY_URL=http://minder-plugin-registry:8001

      # Security
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=HS256

      # Application
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      plugin-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - minder-network

  # Model Fine-Tuning Service - ML model training with Ollama
  model-fine-tuning:
    build:
      context: ../../
      dockerfile: services/model-fine-tuning/Dockerfile
    image: minder/model-fine-tuning:latest
    container_name: minder-model-fine-tuning
    restart: unless-stopped
    environment:
      # Ollama Configuration
      - OLLAMA_HOST=http://ollama:11434
      - DEFAULT_BASE_MODEL=${DEFAULT_BASE_MODEL:-llama3.2}

      # Storage
      - TRAINING_DATA_PATH=/app/training-data
      - MODELS_OUTPUT_PATH=/app/models

      # Application
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    volumes:
      - model_fine_tuning_data:/app/training-data
      - fine_tuned_models:/app/models
    ports:
      - "8007:8007"
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8007/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - minder-network

  # TTS/STT Service - Text-to-Speech and Speech-to-Text
  tts-stt-service:
    build:
      context: ../../
      dockerfile: services/tts-stt-service/Dockerfile
    image: minder/tts-stt-service:latest
    container_name: minder-tts-stt-service
    restart: unless-stopped
    environment:
      # Model configuration
      - TTS_MODEL=${TTS_MODEL:-tts_models/multilingual/multi-dataset/xtts_v2}
      - STT_MODEL=${STT_MODEL:-base}
      - DEVICE=${TTS_DEVICE:-cpu}
      - COMPUTE_TYPE=${TTS_COMPUTE_TYPE:-int8}

      # Application
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    ports:
      - "8006:8006"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - minder-network

  # PostgreSQL Exporter - Expose PostgreSQL metrics
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.12.0
    container_name: minder-postgres-exporter
    restart: unless-stopped
    environment:
      - DATA_SOURCE_NAME=postgresql://minder:${POSTGRES_PASSWORD}@postgres:5432/minder?sslmode=disable
    ports:
      - "9187:9187"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9187/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - minder-network
    profiles:
      - monitoring

  # Redis Exporter - Expose Redis metrics
  redis-exporter:
    image: oliver006/redis_exporter:v1.55.0
    container_name: minder-redis-exporter
    restart: unless-stopped
    environment:
      - REDIS_ADDR=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "9121:9121"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9121/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - minder-network
    profiles:
      - monitoring

