services:
  traefik:
    image: traefik:v3.1.6
    container_name: minder-traefik
    restart: on-failure
    command:
    - --api.dashboard=true
    - --providers.docker=true
    - --providers.docker.exposedbydefault=false
    - --providers.file.directory=/etc/traefik/dynamic
    - --entrypoints.web.address=:80
    - --entrypoints.websecure.address=:443
    - --certificatesresolvers.default.acme.tlschallenge=true
    - --certificatesresolvers.default.acme.email=${ACME_EMAIL:-admin@minder.local}
    - --certificatesresolvers.default.acme.storage=/letsencrypt/acme.json
    ports:
    - 80:80
    - 443:443
    - 8081:8080
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock:ro
    - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
    - ./traefik/dynamic:/etc/traefik/dynamic:ro
    - traefik_letsencrypt:/letsencrypt
    - traefik_logs:/var/log/traefik
    healthcheck:
      test:
      - CMD-SHELL
      - nc -z localhost 80 || exit 1
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
    - minder-network
  authelia:
    image: authelia/authelia:4.38.7
    container_name: minder-authelia
    restart: on-failure
    environment:
    - AUTHELIA_STORAGE_POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    - AUTHELIA_DEFAULT_ENCRYPTION_KEY=please_change_this_to_a_32_character_or_more_string
    - AUTHELIA_DEFAULT_JWT_SECRET=please_change_this_to_a_32_character_or_more_string
    volumes:
    - ./authelia/configuration.yml:/config/configuration.yml:ro
    - ./authelia/users_database.yml:/config/users_database.yml:ro
    ports:
    - 9091:9091
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
      - CMD
      - wget
      - --quiet
      - --tries=1
      - --spider
      - http://localhost:9091/api/health
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
    - minder-network
  postgres:
    image: postgres:16
    container_name: minder-postgres
    restart: on-failure
    environment:
      POSTGRES_USER: minder
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: minder
      POSTGRES_MULTIPLE_DATABASES: tefas_db,weather_db,news_db,crypto_db
    volumes:
    - postgres_data:/var/lib/postgresql/data
    - ./postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
    - 5432:5432
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U minder
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
    - minder-network
  redis:
    image: redis:7.2-alpine
    container_name: minder-redis
    restart: on-failure
    environment:
    - REDIS_PASSWORD=${REDIS_PASSWORD}
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD} --masterauth
      ${REDIS_PASSWORD}
    volumes:
    - redis_data:/data
    ports:
    - 6379:6379
    healthcheck:
      test:
      - CMD
      - redis-cli
      - -a
      - ${REDIS_PASSWORD}
      - ping
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
    - minder-network
  ollama:
    image: ollama/ollama:0.5.7
    container_name: minder-ollama
    restart: on-failure
    volumes:
    - ollama_data:/root/.ollama
    - ./ollama/init-models.sh:/docker-entrypoint-initdb.d/init-models.sh:ro
    ports:
    - 11434:11434
    environment:
    - OLLAMA_MODELS=${OLLAMA_MODELS:-llama3.2,nomic-embed-text}
    - OLLAMA_AUTOMATIC_PULL=${OLLAMA_AUTOMATIC_PULL:-true}
    - OLLAMA_HOST=0.0.0.0
    entrypoint:
    - /bin/bash
    - -c
    - "#!/bin/bash\nset -e\n# Start Ollama server in background\n/usr/bin/ollama serve\
      \ &\nOLLAMA_PID=$!\n\n# Wait for Ollama to be ready\necho \"Waiting for Ollama\
      \ to start...\"\nwhile ! curl -s http://localhost:11434/api/tags > /dev/null\
      \ 2>&1; do\n    sleep 2\ndone\necho \"Ollama is ready\"\n\n# Run init script\
      \ if exists\nif [ -f /docker-entrypoint-initdb.d/init-models.sh ]; then\n  \
      \  echo \"Running automatic model download...\"\n    /bin/bash /docker-entrypoint-initdb.d/init-models.sh\n\
      fi\n\n# Keep container running\nwait $OLLAMA_PID\n"
    healthcheck:
      test:
      - CMD-SHELL
      - timeout 5 bash -c '</dev/tcp/127.0.0.1/11434' || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
    - minder-network
  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: minder-qdrant
    restart: on-failure
    volumes:
    - qdrant_data:/qdrant/storage
    ports:
    - 6333:6333
    - 6334:6334
    healthcheck:
      test:
      - CMD-SHELL
      - timeout 5 bash -c '</dev/tcp/127.0.0.1/6333' || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
    - minder-network
  neo4j:
    image: neo4j:5.24-community
    container_name: minder-neo4j
    restart: on-failure
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/neo4j_test_password_change_me}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*
    volumes:
    - neo4j_data:/data
    - ./neo4j/init-cypher.sh:/docker-entrypoint-initdb.d/init-cypher.sh:ro
    ports:
    - 7474:7474
    - 7687:7687
    healthcheck:
      test:
      - CMD-SHELL
      - wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
    - minder-network
  api-gateway:
    build:
      context: ../../
      dockerfile: services/api-gateway/Dockerfile
    image: minder/api-gateway:1.0.0
    container_name: minder-api-gateway
    restart: on-failure
    environment:
    - PLUGIN_REGISTRY_URL=http://minder-plugin-registry:8001
    - RAG_PIPELINE_URL=http://minder-rag-pipeline:8004
    - MODEL_MANAGEMENT_URL=http://minder-model-management:8005
    - REDIS_HOST=redis
    - REDIS_PORT=6379
    - REDIS_PASSWORD=${REDIS_PASSWORD}
    - JWT_SECRET=${JWT_SECRET}
    - JWT_ALGORITHM=HS256
    - JWT_EXPIRATION_MINUTES=${JWT_EXPIRATION_MINUTES:-60}
    - RATE_LIMIT_ENABLED=true
    - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-60}
    - RATE_LIMIT_BURST=${RATE_LIMIT_BURST:-100}
    - LOG_LEVEL=${LOG_LEVEL:-INFO}
    - ENVIRONMENT=${ENVIRONMENT:-development}
    ports:
    - 8000:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8000/health
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
    - minder-network
  plugin-registry:
    build:
      context: ../../
      dockerfile: services/plugin-registry/Dockerfile
    image: minder/plugin-registry:1.0.0
    container_name: minder-plugin-registry
    restart: on-failure
    environment:
    - POSTGRES_HOST=postgres
    - POSTGRES_PORT=5432
    - POSTGRES_USER=minder
    - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    - POSTGRES_DB=minder
    - SERVICE_REGISTRY_BACKEND=redis
    - REDIS_HOST=redis
    - REDIS_PORT=6379
    - REDIS_PASSWORD=${REDIS_PASSWORD}
    - PLUGINS_PATH=/app/plugins
    - PLUGINS_DATA_PATH=/app/plugins-data
    - HEALTH_CHECK_INTERVAL_SECONDS=30
    - HEALTH_CHECK_TIMEOUT_SECONDS=10
    - LOG_LEVEL=${LOG_LEVEL:-INFO}
    - ENVIRONMENT=${ENVIRONMENT:-development}
    - MARKETPLACE_URL=http://minder-marketplace:8002
    env_file:
    - .env
    volumes:
    - ../../src/plugins:/app/plugins:ro
    - plugins_data:/app/plugins-data
    ports:
    - 8001:8001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8001/health
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
    - minder-network
  plugin-state-manager:
    build:
      context: ../../
      dockerfile: services/plugin-state-manager/Dockerfile
    image: minder/plugin-state-manager:1.0.0
    container_name: minder-plugin-state-manager
    restart: on-failure
    env_file:
    - .env
    environment:
    - DB_HOST=postgres
    - DB_PORT=5432
    - DB_USER=minder
    - DB_PASSWORD=${POSTGRES_PASSWORD}
    - DB_NAME=minder_marketplace
    - REDIS_HOST=redis
    - REDIS_PORT=6379
    - REDIS_PASSWORD=${REDIS_PASSWORD}
    - MARKETPLACE_URL=http://minder-marketplace:8002
    - PLUGIN_REGISTRY_URL=http://minder-plugin-registry:8001
    - JWT_SECRET=${JWT_SECRET}
    - JWT_ALGORITHM=HS256
    - LOG_LEVEL=${LOG_LEVEL:-INFO}
    - ENVIRONMENT=${ENVIRONMENT:-development}
    - DEFAULT_PLUGINS_CONFIG=/app/src/core/config/default_plugins.yml
    ports:
    - 8003:8003
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      plugin-registry:
        condition: service_healthy
    volumes:
    - ../../src/core/config/default_plugins.yml:/app/src/core/config/default_plugins.yml:ro
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8003/health
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
    - minder-network
  rag-pipeline:
    build:
      context: ../../
      dockerfile: services/rag-pipeline/Dockerfile
    image: minder/rag-pipeline:1.0.0
    container_name: minder-rag-pipeline
    restart: on-failure
    environment:
    - QDRANT_HOST=qdrant
    - QDRANT_PORT=6333
    - OLLAMA_HOST=http://ollama:11434
    - OLLAMA_EMBEDDING_MODEL=${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
    - OLLAMA_LLM_MODEL=${OLLAMA_LLM_MODEL:-llama3.2}
    - MODEL_MANAGEMENT_URL=http://minder-model-management:8005
    - LOG_LEVEL=${LOG_LEVEL:-INFO}
    - ENVIRONMENT=${ENVIRONMENT:-development}
    ports:
    - 8004:8004
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8004/health
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
    - minder-network
  model-management:
    build:
      context: ../../
      dockerfile: services/model-management/Dockerfile
    image: minder/model-management:1.0.0
    container_name: minder-model-management
    restart: on-failure
    environment:
    - POSTGRES_HOST=postgres
    - POSTGRES_PORT=5432
    - POSTGRES_USER=minder
    - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    - POSTGRES_DB=minder
    - MODELS_PATH=/app/models
    - MODEL_CACHE_PATH=/app/model-cache
    - LOG_LEVEL=${LOG_LEVEL:-INFO}
    - ENVIRONMENT=${ENVIRONMENT:-development}
    volumes:
    - models_data:/app/models
    - models_cache:/app/model-cache
    ports:
    - 8005:8005
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8005/health
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
    - minder-network
  influxdb:
    image: influxdb:2.7.12
    container_name: minder-influxdb
    restart: on-failure
    environment:
    - DOCKER_INFLUXDB_INIT_MODE=setup
    - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_ADMIN_USERNAME:-admin}
    - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_ADMIN_PASSWORD:-minderadmin123}
    - DOCKER_INFLUXDB_INIT_ORG=minder
    - DOCKER_INFLUXDB_INIT_BUCKET=minder-metrics
    - DOCKER_INFLUXDB_INIT_RETENTION=30d
    - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN}
    - INFLUXDB_LOG_LEVEL=info
    - INFLUXDB_LOG_FORMAT=auto
    volumes:
    - influxdb_data:/var/lib/influxdb2
    - influxdb_config:/etc/influxdb
    ports:
    - 8086:8086
    - 8083:8083
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8086/health
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
    - minder-network
  telegraf:
    image: telegraf:1.33.1
    container_name: minder-telegraf
    restart: on-failure
    volumes:
    - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
    - /proc:/host/proc:ro
    - /sys:/host/sys:ro
    - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
    - INFLUXDB_TOKEN=${INFLUXDB_TOKEN:-my-super-secret-auth-token}
    - HOSTNAME=minder-server
    - INSTANCE=production
    - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      influxdb:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command:
    - --config
    - /etc/telegraf/telegraf.conf
    healthcheck:
      test:
      - CMD
      - pgrep
      - -f
      - telegraf
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
    - minder-network
    privileged: false
    pid: host
    user: root
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: minder-prometheus
    restart: on-failure
    volumes:
    - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    - prometheus_data:/prometheus
    ports:
    - 9090:9090
    healthcheck:
      test:
      - CMD
      - wget
      - --quiet
      - --tries=1
      - --spider
      - http://localhost:9090/-/healthy
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
    - minder-network
    profiles:
    - monitoring
    command:
    - --config.file=/etc/prometheus/prometheus.yml
    - --storage.tsdb.path=/prometheus
    - --web.console.libraries=/etc/prometheus/console_libraries
    - --web.console.templates=/etc/prometheus/consoles
    - --web.enable-lifecycle
    - --web.enable-admin-api
  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: minder-alertmanager
    restart: on-failure
    volumes:
    - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    - alertmanager_data:/alertmanager
    ports:
    - 9093:9093
    networks:
    - minder-network
    profiles:
    - monitoring
    command:
    - --config.file=/etc/alertmanager/alertmanager.yml
    - --storage.path=/alertmanager
    - --web.external-url=http://localhost:9093
  grafana:
    image: grafana/grafana:11.4.0
    container_name: minder-grafana
    restart: on-failure
    environment:
    - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
    - grafana_data:/var/lib/grafana
    - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
    - 3000:3000
    networks:
    - minder-network
    profiles:
    - monitoring
  openwebui:
    image: ghcr.io/open-webui/open-webui:latest
    container_name: minder-openwebui
    restart: on-failure
    environment:
    - OLLAMA_BASE_URL=http://ollama:11434
    - RAG_PIPELINE_URL=http://minder-rag-pipeline:8004
    - RAG_ENABLED=true
    - MINDER_API_GATEWAY_URL=http://minder-api-gateway:8000
    - MINDER_AI_TOOLS_ENABLED=true
    - MINDER_FUNCTIONS_CONFIG=/app/config/functions.json
    - DATABASE_URL=postgresql://minder:${POSTGRES_PASSWORD}@postgres:5432/minder
    - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-change-this-to-a-random-secret-key}
    - WEBUI_AUTH=${WEBUI_AUTH:-true}
    - JWT_SECRET=${JWT_SECRET}
    - JWT_EXPIRATION_MINUTES=${JWT_EXPIRATION_MINUTES:-60}
    - ENABLE_SIGNUP=true
    - DEFAULT_USER_ROLE=user
    - DEFAULT_MODELS=${OLLAMA_LLM_MODEL:-llama3.2}
    - WEBUI_NAME=Minder AI Chat
    - WEBUI_URL=http://localhost:3000
    - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
    - openwebui_data:/app/backend/data
    - ./openwebui/functions.json:/app/config/functions.json:ro
    ports:
    - 8080:8080
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
      rag-pipeline:
        condition: service_healthy
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8080/health
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
    - minder-network
  marketplace:
    build:
      context: ../../
      dockerfile: services/marketplace/Dockerfile
    image: minder/marketplace:1.0.0
    container_name: minder-marketplace
    restart: on-failure
    env_file:
    - .env
    environment:
    - MARKETPLACE_DATABASE_HOST=postgres
    - MARKETPLACE_DATABASE_PORT=5432
    - MARKETPLACE_DATABASE_USER=minder
    - MARKETPLACE_DATABASE_PASSWORD=${POSTGRES_PASSWORD}
    - MARKETPLACE_DATABASE_NAME=minder_marketplace
    - REDIS_HOST=redis
    - REDIS_PORT=6379
    - REDIS_PASSWORD=${REDIS_PASSWORD}
    - PLUGIN_REGISTRY_URL=http://minder-plugin-registry:8001
    - JWT_SECRET=${JWT_SECRET}
    - JWT_ALGORITHM=HS256
    - LOG_LEVEL=${LOG_LEVEL:-INFO}
    - ENVIRONMENT=${ENVIRONMENT:-development}
    ports:
    - 8002:8002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      plugin-registry:
        condition: service_healthy
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8002/health
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
    - minder-network
  model-fine-tuning:
    build:
      context: ../../
      dockerfile: services/model-fine-tuning/Dockerfile
    image: minder/model-fine-tuning:1.0.0
    container_name: minder-model-fine-tuning
    restart: on-failure
    environment:
    - OLLAMA_HOST=http://ollama:11434
    - DEFAULT_BASE_MODEL=${DEFAULT_BASE_MODEL:-llama3.2}
    - TRAINING_DATA_PATH=/app/training-data
    - MODELS_OUTPUT_PATH=/app/models
    - LOG_LEVEL=${LOG_LEVEL:-INFO}
    - ENVIRONMENT=${ENVIRONMENT:-development}
    volumes:
    - model_fine_tuning_data:/app/training-data
    - fine_tuned_models:/app/models
    ports:
    - 8007:8007
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8007/health
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
    - minder-network
  tts-stt-service:
    build:
      context: ../../
      dockerfile: services/tts-stt-service/Dockerfile
    image: minder/tts-stt-service:1.0.0
    container_name: minder-tts-stt-service
    restart: on-failure
    environment:
    - TTS_MODEL=${TTS_MODEL:-tts_models/multilingual/multi-dataset/xtts_v2}
    - STT_MODEL=${STT_MODEL:-base}
    - DEVICE=${TTS_DEVICE:-cpu}
    - COMPUTE_TYPE=${TTS_COMPUTE_TYPE:-int8}
    - LOG_LEVEL=${LOG_LEVEL:-INFO}
    - ENVIRONMENT=${ENVIRONMENT:-development}
    ports:
    - 8006:8006
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8006/health
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
    - minder-network
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: minder-postgres-exporter
    restart: on-failure
    environment:
    - DATA_SOURCE_NAME=postgresql://minder:${POSTGRES_PASSWORD}@postgres:5432/minder?sslmode=disable
    ports:
    - 9187:9187
    healthcheck:
      test:
      - CMD
      - wget
      - --quiet
      - --tries=1
      - --spider
      - http://localhost:9187/metrics
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
    networks:
    - minder-network
    profiles:
    - monitoring
  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    container_name: minder-redis-exporter
    restart: on-failure
    environment:
    - REDIS_ADDR=redis://redis:6379
    - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
    - 9121:9121
    healthcheck:
      test:
      - CMD
      - wget
      - --quiet
      - --tries=1
      - --spider
      - http://localhost:9121/metrics
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      redis:
        condition: service_healthy
    networks:
    - minder-network
    profiles:
    - monitoring
volumes:
  traefik_letsencrypt:
    driver: local
  traefik_logs:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local
  ollama_data:
    driver: local
  qdrant_data:
    driver: local
  neo4j_data:
