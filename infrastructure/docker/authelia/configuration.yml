theme: dark

server:
  address: tcp://0.0.0.0:9091

log:
  level: info

authentication_backend:
  file:
    path: /config/users_database.yml

session:
  name: authelia_session
  expiration: 1h
  inactivity: 5m
  remember_me: 1M
  cookies:
    - name: authelia_session
      domain: minder.local
      authelia_url: https://auth.minder.local

regulation:
  max_retries: 5
  find_time: 2m
  ban_time: 5m

storage:
  encryption_key: AUTHELIA_DEFAULT_ENCRYPTION_KEY
  postgres:
    address: tcp://postgres:5432
    database: minder_authelia
    username: minder

notifier:
  disable_startup_check: true
  filesystem:
    filename: /config/notification.txt

access_control:
  default_policy: one_factor
  rules:
    - domain:
        - public.minder.local
      policy: bypass

    - domain:
        - "*.minder.local"
      resources:
        - "^/health(.*)"
      policy: bypass

    - domain:
        - admin.minder.local
      subject:
        - ["group:admins"]
      policy: two_factor

    - domain:
        - api.minder.local
      policy: two_factor

    - domain:
        - app.minder.local
      policy: one_factor

identity_validation:
  reset_password:
    jwt_secret: AUTHELIA_DEFAULT_JWT_SECRET
