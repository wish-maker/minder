version: '3.8'

services:
  # ===================================================================
  # INFRASTRUCTURE LAYER
  # ===================================================================

  postgres:
    image: postgres:16
    container_name: minder-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: minder
      POSTGRES_PASSWORD: Gq3gHOd9z9UvTJycJgWbzOnXvFyjloHe
      POSTGRES_DB: minder
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - minder-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minder"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: minder-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass 3t5Vl1TElFS4H5TEdpnob7IFzs2JLKF2
    volumes:
      - redis_data:/data
    networks:
      - minder-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: minder-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - minder-network

  # ===================================================================
  # SECURITY & AUTHENTICATION LAYER
  # ===================================================================

  authelia:
    image: authelia/authelia:latest
    container_name: minder-authelia
    restart: unless-stopped
    volumes:
      - ./authelia/configuration.yml:/config/configuration.yml:ro
      - ./authelia/users_database.yml:/config/users_database.yml:ro
      - authelia_data:/config/db
      - authelia_logs:/logs
    environment:
      - TZ=Etc/UTC
    networks:
      - minder-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.authelia.rule=Host(`auth.localhost.minder.local`)"
      - "traefik.http.routers.authelia.tls=true"
      - "traefik.http.services.authelia.loadbalancer.server.port=9091"
    depends_on:
      - postgres

  # ===================================================================
  # REVERSE PROXY LAYER (Nginx)
  # ===================================================================

  nginx-proxy:
    image: nginx:alpine
    container_name: minder-nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    networks:
      - minder-network
    depends_on:
      - authelia
      - api-gateway-merged
      - ai-services-unified
      - openwebui

  # ===================================================================
  # APPLICATION SERVICES LAYER
  # ===================================================================

  api-gateway-merged:
    build:
      context: ../../
      dockerfile: services/api-gateway-merged/Dockerfile
    image: minder/api-gateway-merged:latest
    container_name: minder-api-gateway-merged
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://minder:Gq3gHOd9z9UvTJycJgWbzOnXvFyjloHe@postgres:5432/minder
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=3t5Vl1TElFS4H5TEdpnob7IFzs2JLKF2
      - JWT_SECRET=UNXsEmWsBqTtq1GEWfK3gfF6SAMyLjT62fbPkLYDa1Hac6CTsTmE3kEc37nWAvpi
      - JWT_EXPIRATION_MINUTES=60
      - TRUSTED_PROXIES=*
    networks:
      - minder-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ai-services-unified:
    build:
      context: ../../
      dockerfile: services/ai-services-unified/Dockerfile
    image: minder/ai-services-unified:latest
    container_name: minder-ai-services-unified
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://minder:Gq3gHOd9z9UvTJycJgWbzOnXvFyjloHe@postgres:5432/minder
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=3t5Vl1TElFS4H5TEdpnob7IFzs2JLKF2
      - OLLAMA_BASE_URL=http://ollama:11434
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    networks:
      - minder-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      ollama:
        condition: service_started

  # ===================================================================
  # EXTERNAL SERVICES
  # ===================================================================

  ollama:
    image: ollama/ollama:latest
    container_name: minder-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - minder-network

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: minder-openwebui
    restart: unless-stopped
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=0767beb7e56c645fc1eebb233de70593ea87c86c6b8b9c9815b9f57b45f3c921
      - ENABLE_SIGNUP=false
    networks:
      - minder-network
    depends_on:
      - ollama

# ===================================================================
# NETWORKS
# ===================================================================

networks:
  minder-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ===================================================================
# VOLUMES
# ===================================================================

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  qdrant_data:
    driver: local
  ollama_data:
    driver: local
  authelia_data:
    driver: local
  authelia_logs:
    driver: local
  nginx_cache:
    driver: local
