# Minder Platform - Prometheus Configuration
global:
  scrape_interval: 60s
  evaluation_interval: 60s
  external_labels:
    cluster: 'minder-platform'
    environment: 'production'

# Alerting configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# Rule files
rule_files:
  - '/etc/prometheus/rules/*.yml'

# Scrape configurations
scrape_configs:
  # API Gateway
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:8000']
    metrics_path: '/metrics'
    params:
      # Bypass rate limiter for internal monitoring
      bypass:
        - 'true'

  # Plugin Registry
  - job_name: 'plugin-registry'
    static_configs:
      - targets: ['plugin-registry:8001']
    metrics_path: '/metrics'

  # RAG Pipeline
  - job_name: 'rag-pipeline'
    static_configs:
      - targets: ['rag-pipeline:8004']
    metrics_path: '/metrics'

  # Model Management
  - job_name: 'model-management'
    static_configs:
      - targets: ['model-management:8005']
    metrics_path: '/metrics'

  # Plugin State Manager - No metrics endpoint available
  # - job_name: 'plugin-state-manager'
  #   static_configs:
  #     - targets: ['plugin-state-manager:8003']
  #     metrics_path: '/metrics'

  # Marketplace - No metrics endpoint available
  # - job_name: 'marketplace'
  #   static_configs:
  #     - targets: ['marketplace:8002']
  #     metrics_path: '/metrics'

  # TTS-STT Service
  - job_name: 'tts-stt-service'
    static_configs:
      - targets: ['tts-stt-service:8006']
    metrics_path: '/metrics'

  # Model Fine-tuning
  - job_name: 'model-fine-tuning'
    static_configs:
      - targets: ['model-fine-tuning:8007']
    metrics_path: '/metrics'

  # OpenWebUI - No metrics endpoint available
  # - job_name: 'openwebui'
  #   static_configs:
  #     - targets: ['openwebui:8080']

  # PostgreSQL Exporter
  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # Redis Exporter
  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']

  # RabbitMQ Exporter
  - job_name: 'rabbitmq-exporter'
    static_configs:
      - targets: ['rabbitmq-exporter:9090']

  # Node Exporter (if available)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # Telegraf
  - job_name: 'telegraf'
    static_configs:
      - targets: ['telegraf:9273']
