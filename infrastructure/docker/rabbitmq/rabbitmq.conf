# RabbitMQ Configuration for Minder Platform
# Version: 1.0.0
# Last Updated: 2026-05-02

# =============================================================================
# Cluster Configuration
# =============================================================================

# Cluster name (for future multi-node setup)
cluster_formation.peer_discovery_backend = rabbit_peer_discovery_classic_config
cluster_formation.classic_config.nodes.1 = rabbit@rabbitmq

# =============================================================================
# Memory and Disk Limits
# =============================================================================

# Memory threshold (relative to RAM)
vm_memory_high_watermark.relative = 0.4

# Disk free space limit (50MB minimum)
disk_free_limit.absolute = 50000000

# =============================================================================
# Authentication and Authorization
# =============================================================================

# Enable authentication loopback users (for management)
auth_loopback_users.guest = false

# =============================================================================
# Management Plugin
# =============================================================================

# Enable management plugin
management.tcp.port = 15672

# Load management plugin and other plugins
management.load_definitions = /etc/rabbitmq/definitions.json

# =============================================================================
# Logging
# =============================================================================

# Log to console and file
log.console = true
log.console.level = info

# Log file location
log.file = false

# =============================================================================
# MQTT, STOMP, and Other Protocols (Disabled by Default)
# =============================================================================

# Disable unused protocols for security
mqtt.listeners = none
stomp.listeners = none
# ============================================================-====================
# TLS/SSL Configuration (For Future Use)
# =============================================================================

# TLS not enabled in development
# To enable in production:
# 1. Place certificates in /etc/rabbitmq/tls/
# 2. Uncomment the following lines:
# listeners.ssl.default = 5671
# ssl_options.certfile = /etc/rabbitmq/tls/cert.pem
# ssl_options.keyfile = /etc/rabbitmq/tls/key.pem

# =============================================================================
# Performance Tuning
# =============================================================================

# Connection and channel max
channel_max = 2048
connection_max = infinity

# Heartbeat timeout (seconds)
heartbeat = 60

# =============================================================================
# Default Queue and Exchange Policies
# =============================================================================

# Default queue type (quorum for durability)
default_queue_type = quorum

# Maximum number of frames to prefetch on a channel
channel_operation_timeout = 15000
