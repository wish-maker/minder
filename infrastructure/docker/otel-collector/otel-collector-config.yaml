# OpenTelemetry Collector Configuration for Minder Platform
# Receives traces from services and forwards to Jaeger for distributed tracing

receivers:
  # OTLP gRPC receiver (for application traces)
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  # Batch traces before sending to Jaeger
  batch:
    timeout: 5s
    send_batch_size: 1024

  # Add service metadata to traces
  attributes:
    actions:
      - key: environment
        value: production
        action: insert
      - key: platform
        value: minder
        action: insert

exporters:
  # Export traces to Jaeger via OTLP
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
    retry_on_failure:
      enabled: true

  # Export metrics to Prometheus
  prometheus:
    endpoint: "0.0.0.0:18888"
    const_labels:
      environment: "production"
      service: "otel-collector"

  # Debug exporter (for troubleshooting)
  debug:
    verbosity: detailed

service:
  pipelines:
    # Traces pipeline: receive -> batch -> export to Jaeger
    traces:
      receivers: [otlp]
      processors: [batch, attributes]
      exporters: [otlp/jaeger, debug]

extensions:
  # Health check extension
  health_check:
    endpoint: 0.0.0.0:13133

  # Prometheus metrics for the collector itself
  pprof:
    endpoint: 0.0.0.0:1777

  # Z-Pages for debugging
  zpages:
    endpoint: 0.0.0.0:55679
