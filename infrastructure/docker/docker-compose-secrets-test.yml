# Test file for Docker Secrets functionality
version: '3.8'

secrets:
  postgres_password:
    file: ./.secrets/postgres_password.secret

services:
  postgres-test:
    image: postgres:17.4-alpine
    container_name: minder-postgres-test
    secrets:
      - postgres_password
    environment:
      POSTGRES_USER: minder
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: minder_test
    networks:
      - minder-network

networks:
  minder-network:
    external: true
    name: docker_minder-network
