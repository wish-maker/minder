# Nginx Reverse Proxy Configuration for Minder Platform
# Provides SSL termination and Authelia integration

events {
    worker_connections 1024;
}

http {
    # Upstream definitions
    upstream authelia {
        server authelia:9091;
    }

    upstream api_gateway {
        server api-gateway-merged:8000;
    }

    upstream ai_services {
        server ai-services-unified:8004;
    }

    upstream openwebui {
        server openwebui:8080;
    }

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=ai_limit:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=ui_limit:10m rate=20r/s;

    server {
        listen 80;
        server_name _;

        # Redirect HTTP to HTTPS (except for health checks)
        location /health {
            proxy_pass http://api_gateway;
            access_log off;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl http2;
        server_name localhost.minder.local;

        # SSL certificates (self-signed for development)
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        # SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Authelia configuration
        set $upstream_authelia "authelia";

        # API Gateway endpoints
        location /api/ {
            # Rate limiting
            limit_req zone=api_limit burst=20;

            # Authelia integration
            auth_request /authelia;
            auth_request_set $user $upstream_http_x_authelia_user;
            auth_request_set $groups $upstream_http_x_authelia_groups;
            auth_request_set $groups $upstream_http_x_authelia_groups;

            # Proxy to API Gateway
            proxy_pass http://api_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Authelia-User $user;
            proxy_set_header X-Authelia-Groups $groups;
        }

        location /plugins/ {
            # Rate limiting
            limit_req zone=api_limit burst=20;

            # Authelia integration
            auth_request /authelia;
            auth_request_set $user $upstream_http_x_authelia_user;
            auth_request_set $groups $upstream_http_x_authelia_groups;

            # Proxy to API Gateway
            proxy_pass http://api_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Authelia-User $user;
            proxy_set_header X-Authelia-Groups $groups;
        }

        # AI Services endpoints
        location /rag/ {
            # Rate limiting
            limit_req zone=ai_limit burst=10;

            # Authelia integration
            auth_request /authelia;
            auth_request_set $user $upstream_http_x_authelia_user;
            auth_request_set $groups $upstream_http_x_authelia_groups;

            # Proxy to AI Services
            proxy_pass http://ai_services;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Authelia-User $user;
            proxy_set_header X-Authelia-Groups $groups;
        }

        location /models/ {
            # Rate limiting
            limit_req zone=ai_limit burst=10;

            # Authelia integration
            auth_request /authelia;
            auth_request_set $user $upstream_http_x_authelia_user;
            auth_request_set $groups $upstream_http_x_authelia_groups;

            # Proxy to AI Services
            proxy_pass http://ai_services;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Authelia-User $user;
            proxy_set_header X-Authelia-Groups $groups;
        }

        # OpenWebUI
        location / {
            # Rate limiting
            limit_req zone=ui_limit burst=30;

            # Authelia integration
            auth_request /authelia;
            auth_request_set $user $upstream_http_x_authelia_user;
            auth_request_set $groups $upstream_http_x_authelia_groups;

            # Proxy to OpenWebUI
            proxy_pass http://openwebui;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Authelia-User $user;
            proxy_set_header X-Authelia-Groups $groups;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Authelia endpoints
        location /authelia {
            proxy_pass http://authelia;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Public endpoints (no auth required)
        location /docs {
            proxy_pass http://api_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-ForwardedProto $scheme;
        }

        location /health {
            proxy_pass http://api_gateway;
            access_log off;
        }

        location /openapi.json {
            proxy_pass http://api_gateway;
            access_log off;
        }

        # Metrics endpoint (admin only)
        location /metrics {
            auth_request /authelia;
            auth_request_set $user $upstream_http_x_authelia_user;
            auth_request_set $groups $upstream_http_x_authelia_groups;

            # Only allow admins
            set $admin_allowed 0;
            if ($upstream_http_x_authelia_groups ~* "admins") {
                set $admin_allowed 1;
            }
            if ($admin_allowed = 0) {
                return 403;
            }

            proxy_pass http://api_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-ForwardedFor $proxy_add_x_forwarded_for;
            proxy_set_header X-ForwardedProto $scheme;
        }
    }
}
