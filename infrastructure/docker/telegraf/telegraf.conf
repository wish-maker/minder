# ============================================================================
# Telegraf Configuration for Minder Platform
# ============================================================================
# Pillar 4: Deep Observability - Host and container metrics collection
#
# This configuration collects comprehensive system metrics including CPU,
# memory, disk, network, and Docker container stats for InfluxDB storage.
# ============================================================================

[agent]
  ## Interval at which to gather metrics
  interval = "60s"
  ## Round interval to nearest interval
  round_interval = true
  ## Flush interval
  flush_interval = "60s"
  ## Log file can be stdout for container logging
  # logfile = "/dev/stdout"  # Disabled for container compatibility
  ## Debug mode
  debug = false

###############################################################################
#                            OUTPUT PLUGINS                                   #
###############################################################################

# InfluxDB 2.x Output
[[outputs.influxdb_v2]]
  ## InfluxDB 2.x URLs
  urls = ["http://influxdb:8086"]

  ## Token for authentication
  ## Use environment variable INFLUXDB_TOKEN
  token = "${INFLUXDB_TOKEN}"

  ## Organization
  organization = "minder"

  ## Destination bucket
  bucket = "minder-metrics"

  ## Precision for timestamps
  precision = "s"

###############################################################################
#                            INPUT PLUGINS                                    #
###############################################################################

# CPU Metrics
[[inputs.cpu]]
  ## Collect CPU metrics
  ## Per-CPU and total CPU usage
  percpu = true
  totalcpu = true
  ## Collect CPU time for each state
  collect_cpu_time = false

# Memory Metrics
[[inputs.mem]]

# Disk Metrics
[[inputs.disk]]
  ## Collect disk metrics for all mounted filesystems
  mount_points = ["/"]

# Disk I/O Metrics
[[inputs.diskio]]

# Network Metrics
[[inputs.net]]
  ## Collect interface metrics
  ## Exclude specific interfaces if needed
  # interface_exclude = ["docker*", "veth*", "br-*"]

# System Load Average
[[inputs.system]]

# Process Stats
[[inputs.processes]]

###############################################################################
#                            SERVICE INPUTS                                  #
###############################################################################

# PostgreSQL Metrics
[[inputs.postgresql]]
  ## PostgreSQL connection parameters
  address = "postgres://minder:${POSTGRES_PASSWORD}@postgres:5432/minder?sslmode=disable"
  ## Databases to collect metrics from
  databases = ["minder", "minder_marketplace"]

# Redis Metrics
[[inputs.redis]]
  ## Redis connection parameters
  servers = ["tcp://redis:6379"]
  ## Redis password (if required)
  password = "${REDIS_PASSWORD}"

###############################################################################
#                            DOCKER INPUTS                                   #
###############################################################################

# Docker Container Metrics
[[inputs.docker]]
  ## Docker endpoint
  endpoint = "unix:///var/run/docker.sock"

  ## Timeout for docker list
  timeout = "5s"

  ## Include only specific containers (regex)
  ## Collect from all minder containers
  container_include = []

  ## Exclude specific containers
  container_exclude = ["telegraf"]

  ## Collect sources (cpu, mem, net, blkio)
  source_tag = true
  container_name = true

###############################################################################
#                            PROCESSORS                                      #
###############################################################################

# Add hostname and environment tags
[[processors.override]]
  [processors.override.tags]
    hostname = "${HOSTNAME:minder-server}"
    environment = "${ENVIRONMENT:production}"
    cluster = "minder-platform"

###############################################################################
#                            AGGREGATORS                                     #
###############################################################################

# Aggregate CPU metrics per interval
[[aggregators.mean]]
  ## Period to aggregate
  period = "5m"
  ## Drop original metrics
  drop_original = false
