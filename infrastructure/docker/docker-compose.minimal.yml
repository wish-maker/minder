version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: minder-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: minder
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: minder
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minder"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - minder-network

  redis:
    image: redis:7-alpine
    container_name: minder-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - minder-network

  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: minder-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - minder-network

  api-gateway:
    build:
      context: ../../
      dockerfile: services/api-gateway/Dockerfile
    image: minder/api-gateway:latest
    container_name: minder-api-gateway
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://minder:${POSTGRES_PASSWORD}@postgres:5432/minder
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - PLUGIN_REGISTRY_URL=http://plugin-registry:8001
      - RAG_PIPELINE_URL=http://rag-pipeline:8004
      - JWT_SECRET=${JWT_SECRET}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - minder-network

  plugin-registry:
    build:
      context: ../../
      dockerfile: services/plugin-registry/Dockerfile
    image: minder/plugin-registry:latest
    container_name: minder-plugin-registry
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://minder:${POSTGRES_PASSWORD}@postgres:5432/minder
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - minder-network

  ollama:
    image: ollama/ollama:latest
    container_name: minder-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434
    networks:
      - minder-network

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: minder-openwebui
    restart: unless-stopped
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=${WEBUI_SECRET}
    ports:
      - "8080:8080"
    depends_on:
      ollama:
        condition: service_started
    networks:
      - minder-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  qdrant_data:
    driver: local
  ollama_data:
    driver: local

networks:
  minder-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
