[tool.black]
line-length = 88
target-version = ['py311']

[tool.isort]
profile = "black"
line_length = 88
skip = [".git", "__pycache__", "venv", "env"]
# 'config' is a first-party, service-local module (e.g. api-gateway/config.py).
# Declared explicitly so its import placement no longer depends on an incidental
# top-level src/config/ directory (removed in the src/config→src/requirements rename).
known_first_party = ["config"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
markers = [
    "integration: tests that exercise a running service or backend",
    "e2e: end-to-end tests across multiple services",
    "slow: tests that take a long time to run",
    "security: security-focused tests",
]
